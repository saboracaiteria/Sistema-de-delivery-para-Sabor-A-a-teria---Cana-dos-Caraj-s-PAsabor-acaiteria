<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Delivery">
  <meta name="description" content="Sistema de delivery rápido e fácil para Açaiteria. Faça seu pedido agora!" />
  <title>Sistema de Delivery</title>
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Outfit:wght@300;400;500;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Roboto', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              purple: 'var(--color-header-bg)',
              red: 'var(--color-button-primary)',
              green: '#4caf50',  // Keep static for now unless requested
              dark: 'var(--color-text-primary)',   // Map dark to text primary? Or footer?
              bg: 'var(--color-background)',     // Map bg to background
            }
          },
          animation: {
            'shimmer': 'shimmer 2s infinite',
          },
          keyframes: {
            shimmer: {
              '100%': { transform: 'translateX(100%)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* CSS Variables for Theme Customization */
    :root {
      --color-header-bg: #4E0797;
      --color-header-text: #ffffff;
      --color-background: #f6f6f6;
      --color-card-bg: #ffffff;
      --color-card-text: #333333;
      --color-button-primary: #e50914;
      --color-button-text: #ffffff;
      --color-text-primary: #1e1e1e;
      --color-text-secondary: #666666;
    }

    /* Hide scrollbar for horizontal scrolling */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body {
      background-color: var(--color-background);
    }
  </style>
</head>

<body class="bg-brand-bg text-gray-800 font-sans antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
